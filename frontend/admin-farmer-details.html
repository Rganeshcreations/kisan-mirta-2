<!DOCTYPE html>
<html>

<head>
<title>Farmer Details - KisanMitra</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:#2c3e50;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
width:90%;
margin:10px;
padding:12px;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:5px;
}

.sidebar button:hover{
background:#1abc9c;
}

/* Main */

.main{
margin-left:260px;
padding:30px;
}

.section{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

/* Tables */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#1abc9c;
color:white;
}

/* Profit Box */

.profit-box{
background:#27ae60;
color:white;
padding:20px;
font-size:20px;
border-radius:8px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<button onclick="location.href='admin-dashboard'">Dashboard</button>
<button onclick="location.href='admin-farmers'">Farmers</button>
<button onclick="location.href='admin-experts'">Experts</button>
<button onclick="location.href='admin-users'">Public Users</button>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<h1>Farmer Details</h1>

<div class="profit-box">
Total Profit: ₹ <span id="profit">0</span>
</div>

<!-- Farmer Info -->

<div class="section">

<h2>Farmer Information</h2>

<p><b>Name:</b> <span id="farmerName"></span></p>
<p><b>Email:</b> <span id="farmerEmail"></span></p>

</div>

<!-- Farmer Profile -->

<div class="section">

<h2>Farm Information</h2>

<p><b>Main Crop:</b> <span id="profileCrop"></span></p>
<p><b>Land Area:</b> <span id="profileLand"></span> Acres</p>
<p><b>Soil Type:</b> <span id="profileSoil"></span></p>
<p><b>Location:</b> <span id="profileLocation"></span></p>
<p><b>Irrigation:</b> <span id="profileIrrigation"></span></p>

</div>

<!-- Crops -->

<div class="section">

<h2>Farmer Crops</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Crop</th>
<th>Seeding Date</th>
<th>Land Size</th>
<th>Quantity</th>
<th>Selling Price</th>
<th>Total Value</th>
</tr>
</thead>

<tbody id="cropsTable">
</tbody>

</table>

</div>

<!-- Expenditures -->

<div class="section">

<h2>Expenditures</h2>

<table>

<thead>
<tr>
<th>Crop</th>
<th>Category</th>
<th>Description</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>

<tbody id="expensesTable">
</tbody>

</table>

</div>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const farmerId = urlParams.get("id");

async function loadFarmer(){

const res = await fetch(`https://kisanmitra-backend-98bb.onrender.com/api/admin/farmer-details/${farmerId}`);
const data = await res.json();

/* Farmer */

document.getElementById("farmerName").innerText = data.farmer.name;
document.getElementById("farmerEmail").innerText = data.farmer.email;

/* Profile */

document.getElementById("profileCrop").innerText = data.profile.crops;
document.getElementById("profileLand").innerText = data.profile.land_area;
document.getElementById("profileSoil").innerText = data.profile.soil_type;
document.getElementById("profileLocation").innerText = data.profile.location;
document.getElementById("profileIrrigation").innerText = data.profile.irrigation_type;

/* Crops */

let cropsHTML="";
let totalSales = 0;

data.crops.forEach(c=>{

let value = c.quantity_produced * c.selling_price;
totalSales += value;

cropsHTML+=`
<tr>
<td>${c.id}</td>
<td>${c.crop_name}</td>
<td>${new Date(c.seeding_date).toLocaleDateString()}</td>
<td>${c.land_size} Acres</td>
<td>${c.quantity_produced} kg</td>
<td>₹ ${c.selling_price}</td>
<td>₹ ${value}</td>
</tr>
`;

});

document.getElementById("cropsTable").innerHTML=cropsHTML;

/* Expenditures */

let expHTML="";
let totalExpenses = 0;

data.expenditures.forEach(e=>{

totalExpenses += parseFloat(e.total_amount);

expHTML+=`
<tr>
<td>${e.crop_name}</td>
<td>${e.expense_category}</td>
<td>${e.description}</td>
<td>₹ ${e.total_amount}</td>
<td>${new Date(e.expense_date).toLocaleDateString()}</td>
</tr>
`;

});

document.getElementById("expensesTable").innerHTML=expHTML;

/* Profit Calculation */

let profit = totalSales - totalExpenses;

document.getElementById("profit").innerText = profit;

}

function logout(){

localStorage.clear();
window.location.href="/login";

}

loadFarmer();

</script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
  <title>Farmer Profile - KisanMitra</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("images/farm-bg.jpg") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .profile-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      width: 450px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    .profile-card h1 {
      color: #2e7d32;
      margin-bottom: 20px;
    }

    .profile-card input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .profile-card button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background-color: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .profile-card button:hover {
      background-color: #1b5e20;
    }

    .profile-card img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
      object-fit: cover;
      border: 3px solid #2e7d32;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="profile-card">

<h1>🌾 Complete Your Farmer Profile</h1>

<img id="photoPreview"
src="images/ganesh.jpg"
alt="Farmer Photo">

<input type="file" id="photo" accept="image/*" onchange="previewPhoto()">

<input type="text" id="crops" placeholder="Crops (e.g., Rice, Wheat)">
<input type="text" id="land_area" placeholder="Land Area (in acres)">
<input type="text" id="soil_type" placeholder="Soil Type">
<input type="text" id="location" placeholder="Location">
<input type="text" id="irrigation_type" placeholder="Irrigation Type">

<button onclick="saveFarmerProfile()">Save Profile</button>

<p id="message"></p>

</div>


<script>

// =======================
// LOGIN CHECK
// =======================

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  alert("Please login first");
  window.location.href = "/login";
}



// =======================
// IMAGE PREVIEW
// =======================

function previewPhoto(){

  const file = document.getElementById("photo").files[0];
  const preview = document.getElementById("photoPreview");

  if(file){

    const reader = new FileReader();

    reader.onload = function(e){
      preview.src = e.target.result;
    }

    reader.readAsDataURL(file);

  }

}



// =======================
// SAVE FARMER PROFILE
// =======================

async function saveFarmerProfile(){

  const crops = document.getElementById("crops").value;
  const land_area = document.getElementById("land_area").value;
  const soil_type = document.getElementById("soil_type").value;
  const location = document.getElementById("location").value;
  const irrigation_type = document.getElementById("irrigation_type").value;

  if(!crops || !land_area || !soil_type || !location || !irrigation_type){

      document.getElementById("message").innerText =
      "Please fill all fields";

      return;

  }

  const res = await fetch(
    "https://kisanmitra-backend-98bb.onrender.com/api/users/farmer-profile",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        user_id:user.id,
        crops,
        land_area,
        soil_type,
        location,
        irrigation_type
      })
    }
  );

  const data = await res.json();

  document.getElementById("message").innerText = data.message;

  if(res.ok){

      setTimeout(()=>{
          window.location.href = "farmer";
      },1500);

  }

}

</script>

</body>
</html>

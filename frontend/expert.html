<!DOCTYPE html>

<html>
<head>

<title>Expert Dashboard - KisanMitra</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("images/farm-bg.jpg");
background-size:cover;
background-position:center;
height:100vh;
color:white;
}

.sidebar{
width:240px;
height:100vh;
background:#0b5d1e;
position:fixed;
padding-top:30px;
}

.sidebar h3{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
width:85%;
margin:12px 15px;
padding:12px;
border:none;
border-radius:8px;
background:white;
color:#2e7d32;
font-weight:bold;
cursor:pointer;
}

.content{
margin-left:260px;
padding:30px;
}

.profile{
position:absolute;
top:20px;
right:30px;
text-align:center;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>👨‍🌾 Expert Panel</h3>

<button onclick="location.href='expert-questions'">
📩 Farmer Questions
</button>

<button onclick="location.href='expert-view'">
👤 My Profile
</button>

</div>

<div class="content">

<h2>Welcome Expert 👨‍🌾</h2>

</div>

<div class="profile">

<img src="images/ganesh.jpg"
onclick="location.href='expert-view'">

<p id="expertName"></p>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="/login";
}

document.getElementById("expertName").innerText=user.name;

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Expert Details</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}
.main{padding:30px;}

.profile{
position:absolute;
top:20px;
right:20px;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
cursor:pointer;
border:2px solid #333;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="profile">
<img id="profileImg" src="images/default-user.png" onclick="openProfile()">
</div>

<div class="main">

<h2 id="expertName">Expert Activity</h2>

<div class="card">
<h3>Questions & Answers</h3>
<div id="qa"></div>
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const expertId = params.get("id");
const name = params.get("name");

// ✅ Show name
document.getElementById("expertName").innerText =
`Expert: ${name || "Unknown"}`;

// 🔥 PROFILE BUTTON
function openProfile(){
localStorage.setItem("viewExpertId", expertId);
localStorage.setItem("viewExpertName", name);
window.location.href = "expert-view";
}

// LOAD Q&A
async function loadQA(){

try{

const data = await fetch(
`https://kisanmitra-backend-98bb.onrender.com/api/users/expert-questions/${expertId}`
).then(r=>r.json());

let html="";

data.forEach(q=>{
html+=`
<p><b>Farmer:</b> ${q.farmer_name}</p>
<p><b>Q:</b> ${q.question}</p>
<p><b>A:</b> ${q.answer || "Not answered"}</p>
<hr>
`;
});

document.getElementById("qa").innerHTML = html;

}catch(err){
console.log("Error:", err);
}

}

loadQA();

</script>

</body>
</html>

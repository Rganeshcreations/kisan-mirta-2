<!DOCTYPE html>
<html>

<head>
<title>Government Crops</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
width:250px;
height:100vh;
background:#2c3e50;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar button{
width:90%;
margin:10px;
padding:12px;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:5px;
}

.sidebar button:hover{
background:#1abc9c;
}

.main{
margin-left:260px;
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

th{
background:#27ae60;
color:white;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Government Panel</h2>

<button onclick="location.href='government-dashboard'">Dashboard</button>
<button onclick="location.href='government-farmers'">Farmers</button>
<button onclick="location.href='government-experts'">Experts</button>
<button onclick="location.href='government-crops'">Crops</button>
<button onclick="location.href='government-analytics'">Analytics</button>
<button onclick="logout()">Logout</button>

</div>

<div class="main">

<h2>Crop Monitoring</h2>

<table>

<thead>
<tr>
<th>Farmer</th>
<th>Crop</th>
<th>Seeding Date</th>
<th>Land</th>
<th>Production</th>
<th>Price</th>
</tr>
</thead>

<tbody id="cropsTable"></tbody>

</table>

</div>

<script>

async function loadCrops(){

const res=await fetch("http:///api/admin/crops");
const crops=await res.json();

let html="";

crops.forEach(c=>{

html+=`
<tr>
<td>${c.farmer_name}</td>
<td>${c.crop_name}</td>
<td>${new Date(c.seeding_date).toLocaleDateString()}</td>
<td>${c.land_size} Acres</td>
<td>${c.quantity_produced} kg</td>
<td>₹ ${c.selling_price}</td>
</tr>
`;

});

document.getElementById("cropsTable").innerHTML=html;

}

function logout(){
localStorage.clear();
window.location.href="/login";
}

loadCrops();

</script>

</body>
</html>

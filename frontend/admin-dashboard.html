<!DOCTYPE html>

<html>
<head>

<title>Admin Dashboard - KisanMitra</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.sidebar{
width:250px;
height:100vh;
background:#2c3e50;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar button{
width:90%;
margin:10px;
padding:12px;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:5px;
}

.sidebar button:hover{
background:#1abc9c;
}

.main{
margin-left:260px;
padding:30px;
}

.dashboard{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<button onclick="location.href='admin-dashboard'">Dashboard</button> <button onclick="location.href='admin-farmers'">Farmers</button> <button onclick="location.href='admin-experts'">Experts</button> <button onclick="location.href='admin-users'">Public Users</button> <button onclick="location.href='admin-crops'">Crops</button>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<h2>Admin Dashboard</h2>

<div class="dashboard">

<div class="card">
<h3>Total Users</h3>
<p id="totalUsers">0</p>
</div>

<div class="card">
<h3>Total Farmers</h3>
<p id="totalFarmers">0</p>
</div>

<div class="card">
<h3>Total Experts</h3>
<p id="totalExperts">0</p>
</div>

<div class="card">
<h3>Total Crops</h3>
<p id="totalCrops">0</p>
</div>

</div>

</div>

<script>

async function loadStats(){

const res = await fetch("https://kisanmitra-backend-98bb.onrender.com/api/admin/stats");
const data = await res.json();

document.getElementById("totalUsers").innerText=data.totalUsers;
document.getElementById("totalFarmers").innerText=data.totalFarmers;
document.getElementById("totalExperts").innerText=data.totalExperts;
document.getElementById("totalCrops").innerText=data.totalCrops;

}

function logout(){
localStorage.clear();
window.location.href="/login";
}

loadStats();

</script>

</body>
</html>

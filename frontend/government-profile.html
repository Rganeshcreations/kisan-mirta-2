<!DOCTYPE html>
<html>
<head>
<title>Government Profile - KisanMitra</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:url("images/farm-bg.jpg") no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.profile-card{
background:rgba(255,255,255,0.95);
padding:40px;
width:450px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.profile-card h1{
color:#2e7d32;
margin-bottom:20px;
}

.profile-card input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

.profile-card button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background-color:#2e7d32;
color:white;
font-size:16px;
cursor:pointer;
}

.profile-card button:hover{
background-color:#1b5e20;
}

.profile-card img{
width:100px;
height:100px;
border-radius:50%;
margin-bottom:10px;
object-fit:cover;
border:3px solid #2e7d32;
}

#message{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="profile-card">

<h1>🏛 Government Officer Profile</h1>

<!-- Default local image instead of placeholder site -->

<img id="photoPreview"
src="images/default-user.png"
alt="Officer Photo">

<input type="file" id="photo" accept="image/*" onchange="previewPhoto()">

<input type="text" id="department" placeholder="Department (Agriculture Dept)">
<input type="text" id="district" placeholder="District">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Office Address">

<button onclick="saveGovernmentProfile()">Save Profile</button>

<p id="message"></p>

</div>


<script>

// =======================
// LOGIN CHECK
// =======================

const user = JSON.parse(localStorage.getItem("user"));

if(!user){

alert("Please login first");
window.location.href="/login";

}


// =======================
// IMAGE PREVIEW
// =======================

function previewPhoto(){

const file=document.getElementById("photo").files[0];
const preview=document.getElementById("photoPreview");

if(file){

const reader=new FileReader();

reader.onload=function(e){
preview.src=e.target.result;
}

reader.readAsDataURL(file);

}

}


// =======================
// SAVE GOVERNMENT PROFILE
// =======================

async function saveGovernmentProfile(){

const department=document.getElementById("department").value;
const district=document.getElementById("district").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;

if(!department || !district || !phone || !address){

document.getElementById("message").innerText="Please fill all fields";
return;

}

try{

const res=await fetch(
"http://localhost:5000/api/users/government-profile",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:user.id,
department,
district,
phone,
address
})
}
);

const data=await res.json();

document.getElementById("message").innerText=data.message;

if(res.ok){

setTimeout(()=>{
window.location.href="government-dashboard";
},1500);

}

}
catch(error){

document.getElementById("message").innerText="Server connection error";

}

}

</script>

</body>
</html>

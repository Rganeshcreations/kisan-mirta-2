<!DOCTYPE html>

<html>
<head>
<title>Crop Management - KisanMitra</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:
linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
url("images/farmer-bg.jpg");
background-size:cover;
background-position:center;
color:white;
min-height:100vh;
}

/* HEADER */

.header{
text-align:center;
padding:30px 20px 10px;
font-size:28px;
font-weight:bold;
}

/* BUTTON BAR */

.top-bar{
text-align:center;
margin-bottom:30px;
}

.top-bar button{
padding:12px 25px;
border-radius:30px;
border:none;
margin:8px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(45deg,#4CAF50,#2e7d32);
color:white;
transition:0.3s;
}

.top-bar button:hover{
transform:scale(1.05);
}

/* CARDS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:20px;
}

.card{
width:280px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.card h3{
margin-top:0;
font-size:20px;
}

.card p{
font-size:14px;
margin:8px 0;
}

.card button{
margin-top:15px;
padding:8px 15px;
border-radius:20px;
border:none;
background:#4CAF50;
color:white;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
justify-content:center;
align-items:center;
}

.modal-content{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
width:350px;
}

.modal-content input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:none;
}

.modal-buttons{
display:flex;
justify-content:space-between;
}

.modal-buttons button{
width:48%;
padding:10px;
border-radius:20px;
border:none;
cursor:pointer;
}

.save-btn{background:#4CAF50;color:white;}
.cancel-btn{background:#e53935;color:white;}

</style>

</head>

<body>

<div class="header">🌱 Crop Management</div>

<div class="top-bar">
<button onclick="openModal()">➕ Add Crop</button>
<button onclick="window.location.href='farmer'">⬅ Back</button>
</div>

<div class="container" id="cropContainer"></div>

<div class="modal" id="cropModal">

<div class="modal-content">

<h3>🌾 Add New Crop</h3>

<input type="text" id="crop_name" placeholder="Crop Name">
<input type="date" id="seeding_date">
<input type="number" id="land_size" placeholder="Land Size (acres)">

<div class="modal-buttons">
<button class="save-btn" onclick="addCrop()">Save</button>
<button class="cancel-btn" onclick="closeModal()">Cancel</button>
</div>

</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="/login";
}

/* MODAL */

function openModal(){
document.getElementById("cropModal").style.display="flex";
}

function closeModal(){
document.getElementById("cropModal").style.display="none";
}

/* ADD CROP */

async function addCrop(){

const crop_name=document.getElementById("crop_name").value;
const seeding_date=document.getElementById("seeding_date").value;
const land_size=document.getElementById("land_size").value;

if(!crop_name || !seeding_date || !land_size){
alert("Fill all fields");
return;
}

try{

await fetch("http:///api/users/add-crop",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:user.id,
crop_name,
seeding_date,
land_size
})
});

alert("Crop added successfully");

closeModal();

/* CLEAR FORM */

document.getElementById("crop_name").value="";
document.getElementById("seeding_date").value="";
document.getElementById("land_size").value="";

/* RELOAD CROPS */

loadCrops();

}catch(err){

alert("Error saving crop");

}

}

/* LOAD CROPS */

async function loadCrops(){

try{

const response=await fetch(
"http:///api/users/get-crops/"+user.id
);

const crops=await response.json();

const container=document.getElementById("cropContainer");

container.innerHTML="";

crops.forEach(crop=>{

const today=new Date();
const seedDate=new Date(crop.seeding_date);

const daysPassed=Math.floor(
(today-seedDate)/(1000*60*60*24)
);

const formattedDate=new Date(crop.seeding_date)
.toLocaleDateString();

container.innerHTML+=`

<div class="card">

<h3>${crop.crop_name}</h3>

<p>📅 Seeding Date: ${formattedDate}</p>

<p>⏳ Days Passed: ${daysPassed} days</p>

<p>📏 Land Size: ${crop.land_size} acres</p>

<button onclick="openCrop(${crop.id})">
Open
</button>

</div>

`;

});

}catch(err){

console.log("Error loading crops");

}

}

function openCrop(id){
window.location.href="crop-details?crop_id="+id;
}

loadCrops();

</script>

</body>
</html>

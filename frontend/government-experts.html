<!DOCTYPE html>
<html>
<head>
<title>Government Experts - KisanMitra</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:#1f2d3d;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:20px;
}

.sidebar button{
width:90%;
margin:10px;
padding:12px;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:6px;
font-size:14px;
}

.sidebar button:hover{
background:#27ae60;
}

/* MAIN */
.main{
margin-left:250px;
padding:30px;
}

h2{
margin-bottom:20px;
}

/* TABLE */
table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#2e7d32;
color:white;
}

/* BUTTON */
.view-btn{
background:#1976d2;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

.view-btn:hover{
background:#0d47a1;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Government Panel</h2>

<button onclick="location.href='government-dashboard'">Dashboard</button>
<button onclick="location.href='government-farmers'">Farmers</button>
<button onclick="location.href='government-experts'">Experts</button>

<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<h2>👨‍🌾 Experts Monitoring</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Specialization</th>
<th>Action</th>
</tr>
</thead>

<tbody id="expertsTable"></tbody>

</table>

</div>

<script>

// =======================
// LOAD EXPERTS
// =======================

async function loadExperts(){

try{

const res = await fetch("https://kisanmitra-backend-98bb.onrender.com/api/admin/experts");
const experts = await res.json();

let html="";

experts.forEach(e=>{

html+=`
<tr>
<td>${e.name}</td>
<td>${e.email}</td>
<td>${e.specialization || "-"}</td>
<td>
<button class="view-btn" onclick="viewExpert(${e.id}, '${e.name}')">
View
</button>
</td>
</tr>
`;

});

document.getElementById("expertsTable").innerHTML = html;

}catch(err){
console.log("Error loading experts:", err);
}

}


// =======================
// VIEW EXPERT (IMPORTANT FIX)
// =======================

function viewExpert(id,name){

// pass both id + name
window.location.href =
`government-expert-view?id=${id}&name=${encodeURIComponent(name)}`

}


// =======================
// LOGOUT
// =======================

function logout(){
localStorage.clear();
window.location.href="/login";
}


// LOAD DATA
loadExperts();

</script>

</body>
</html>

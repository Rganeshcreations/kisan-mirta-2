<!DOCTYPE html>
<html>
<head>
<title>Crop Details - KisanMitra</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
url("images/farmer-bg.jpg");
background-size:cover;
color:white;
}

.header{
text-align:center;
padding:25px;
font-size:26px;
font-weight:bold;
}

.tabs{
display:flex;
justify-content:center;
gap:20px;
margin-bottom:20px;
}

.tabs button{
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
background:rgba(255,255,255,0.2);
color:white;
font-weight:bold;
}

.tabs button.active{
background:#4CAF50;
}

.content-box{
width:80%;
margin:auto;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:20px;
backdrop-filter:blur(15px);
}

input,select{
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
width:100%;
}

button.action-btn{
padding:10px 20px;
border-radius:20px;
border:none;
cursor:pointer;
background:#4CAF50;
color:white;
margin-top:10px;
}

.expense-card{
background:rgba(255,255,255,0.15);
padding:10px;
margin:10px 0;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">🌾 Crop Details</div>

<div class="tabs">

<button id="detailsTab" class="active" onclick="showTab('details')">📋 Details</button>

<button id="expenseTab" onclick="showTab('expense')">💰 Expenditures</button>

<button id="summaryTab" onclick="showTab('summary')">📊 Summary</button>

<button onclick="window.location.href='crop-list'">⬅ Back</button>

</div>

<div class="content-box" id="contentArea"></div>

<script>

const urlParams=new URLSearchParams(window.location.search);
const cropId=urlParams.get("crop_id");
if(!cropId){
alert("Invalid Crop ❌");
window.location.href="crop-list";
}

let cropData={};
let expenses=[];

// ================= TAB SWITCH =================
function showTab(tab){

document.querySelectorAll(".tabs button")
.forEach(btn=>btn.classList.remove("active"));

if(tab==="details"){
document.getElementById("detailsTab").classList.add("active");
renderDetails();
}

if(tab==="expense"){
document.getElementById("expenseTab").classList.add("active");
renderExpense();
}

if(tab==="summary"){
document.getElementById("summaryTab").classList.add("active");
renderSummary(); // async safe now
}

}

// ================= LOAD CROP =================
async function loadCrop(){

const res = await fetch(
"http:///api/users/get-crop/"+cropId
);

const data = await res.json();

// 🔥 IMPORTANT FIX
cropData = data;

console.log("CROP DATA:", cropData);

renderDetails();

}

// ================= LOAD EXPENSES =================
async function loadExpenses(){

const res=await fetch(
"http:///api/users/get-expenditures/"+cropId
);

expenses=await res.json();

return expenses;

}

// ================= DETAILS =================
function renderDetails(){

const today=new Date();
const seedDate=new Date(cropData.seeding_date);

const daysPassed=Math.floor(
(today-seedDate)/(1000*60*60*24)
);

const formattedDate=new Date(cropData.seeding_date)
.toLocaleDateString();

document.getElementById("contentArea").innerHTML=`

<h3>${cropData.crop_name}</h3>

<p>📅 Seeding Date: ${formattedDate}</p>

<p>⏳ Days Passed: ${daysPassed} days</p>

<p>📏 Land Size: ${cropData.land_size} acres</p>

<hr>

<h4>Add Production Details</h4>

<input type="number" id="quantity"
placeholder="Quantity Produced"
value="${cropData.quantity_produced || ''}">

<input type="number" id="price"
placeholder="Selling Price per unit"
value="${cropData.selling_price || ''}">

<button class="action-btn"
onclick="updateProduction()">Save</button>

`;

}

// ================= UPDATE PRODUCTION =================
async function updateProduction(){

const quantity = document.getElementById("quantity").value;
const price = document.getElementById("price").value;

// ✅ VALIDATION
if(!quantity || !price){
alert("Please enter both quantity and price ❗");
return;
}

try{

const res = await fetch(
"http:///api/users/update-production/"+cropId,
{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
quantity_produced:quantity,
selling_price:price
})
}
);

// ✅ CHECK RESPONSE
const data = await res.json();

if(!res.ok){
alert("Update failed ❌");
return;
}

// 🔥 SUCCESS
alert("✅ Production Updated Successfully");

// 🔥 AUTO REFRESH DATA
await loadCrop();
await loadExpenses();

// 🔥 OPTIONAL: AUTO SWITCH TO SUMMARY
showTab("summary");

}catch(err){

console.log("Error:", err);
alert("Server error ❌");

}

}

// ================= EXPENSE TAB =================
function renderExpense(){

document.getElementById("contentArea").innerHTML=`

<h3>Add Expenditure</h3>

<select id="expenseType">
<option value="worker">Worker</option>
<option value="fertilizer">Fertilizer</option>
<option value="other">Other</option>
</select>

<input type="text" id="desc" placeholder="Description">
<input type="number" id="amount" placeholder="Total Amount">
<input type="date" id="date">

<button class="action-btn"
onclick="addExpense()">Add Expense</button>

<hr>

<h4>Expense List</h4>

<div id="expenseList"></div>

`;

loadExpenses().then(displayExpenses);

}

// ================= ADD EXPENSE =================
async function addExpense(){

const type = document.getElementById("expenseType").value;
const desc = document.getElementById("desc").value;
const amount = document.getElementById("amount").value;
const date = document.getElementById("date").value;

// ✅ VALIDATION
if(!desc || !amount || !date){
alert("Fill all fields ❗");
return;
}

try{

const res = await fetch(
"http:///api/users/add-expenditure",
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
crop_id:cropId,
expense_category:type,
description:desc,
total_amount:amount,
expense_date:date
})
}
);

const data = await res.json();

if(!res.ok){
alert("Failed to add expense ❌");
return;
}

alert("✅ Expense Added");

// 🔥 REFRESH LIST
await loadExpenses();
displayExpenses();

// 🔥 CLEAR INPUTS
document.getElementById("desc").value="";
document.getElementById("amount").value="";
document.getElementById("date").value="";

}catch(err){
console.log(err);
alert("Server error ❌");
}

}

// ================= DISPLAY EXPENSE =================
function displayExpenses(){

const list=document.getElementById("expenseList");

if(!list)return;

list.innerHTML="";

expenses.forEach(exp=>{

list.innerHTML+=`

<div class="expense-card">

<p><strong>${exp.expense_category}</strong></p>

<p>${exp.description}</p>

<p>₹ ${exp.total_amount}</p>

</div>

`;

});

}

// ================= SUMMARY (FIXED 🔥) =================
async function renderSummary(){

// 🔥 1. Load latest expenses
await loadExpenses();

let totalExpense = 0;

expenses.forEach(e=>{
  totalExpense += Number(e.total_amount) || 0;
});


// 🔥 2. Safe conversion (VERY IMPORTANT)
let quantity = Number(cropData.quantity_produced);
let price = Number(cropData.selling_price);

// Handle invalid values
if(isNaN(quantity)) quantity = 0;
if(isNaN(price)) price = 0;


// 🔥 3. Correct calculation
let revenue = quantity * price;
let profit = revenue - totalExpense;


// 🔥 4. DEBUG (remove later)
console.log("Quantity:", quantity);
console.log("Price:", price);
console.log("Revenue:", revenue);
console.log("Expense:", totalExpense);
console.log("Profit:", profit);


// 🔥 5. UI update
document.getElementById("contentArea").innerHTML=`

<h3>📊 Financial Summary</h3>

<p>💰 Total Expense: ₹ ${totalExpense.toFixed(2)}</p>

<p>📈 Revenue: ₹ ${revenue.toFixed(2)}</p>

<h2 style="color:${profit>=0?'#4CAF50':'red'}">
${profit>=0?"Profit":"Loss"}: ₹ ${profit.toFixed(2)}
</h2>

`;

}

// INIT
loadCrop();

</script>

</body>
</html>

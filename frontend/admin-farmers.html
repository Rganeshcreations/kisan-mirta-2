<!DOCTYPE html>
<html>

<head>
<title>Admin Farmers - KisanMitra</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:#2c3e50;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
width:90%;
margin:10px;
padding:12px;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:5px;
}

.sidebar button:hover{
background:#1abc9c;
}

/* Main */

.main{
margin-left:260px;
padding:30px;
}

.header{
font-size:28px;
margin-bottom:20px;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#1abc9c;
color:white;
}

.action-btn{
background:#3498db;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

.action-btn:hover{
background:#2980b9;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>Admin Panel</h2>

<button onclick="location.href='admin-dashboard'">
Dashboard
</button>

<button onclick="location.href='admin-farmers'">
Farmers
</button>

<button onclick="location.href='admin-experts'">
Experts
</button>

<button onclick="location.href='admin-users'">
Public Users
</button>

<button onclick="logout()">
Logout
</button>

</div>


<!-- Main Content -->

<div class="main">

<div class="header">
Farmers List
</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Action</th>
</tr>

</thead>

<tbody id="farmersTable">

</tbody>

</table>

</div>


<script>

// Load farmers from backend

async function loadFarmers(){

try{

const res = await fetch("http:///api/admin/farmers");

const farmers = await res.json();

let table = "";

farmers.forEach(f => {

table += `
<tr>
<td>${f.id}</td>
<td>${f.name}</td>
<td>${f.email}</td>
<td>
<a href="admin-farmer-details?id=${f.id}">
<button class="action-btn">View</button>
</a>
</td>
</tr>
`;

});

document.getElementById("farmersTable").innerHTML = table;

}catch(error){

console.log("Error loading farmers",error);

}

}


// Logout

function logout(){

localStorage.clear();
window.location.href="/login";

}


// Load data

loadFarmers();

</script>

</body>

</html>

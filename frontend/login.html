<!DOCTYPE html>
<html>
<head>
<title>Login - KisanMitra</title>
<link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-box">

<h2>KisanMitra Login 🌾</h2>

<!-- PASSWORD LOGIN -->

<input type="email" id="email" placeholder="Email">

<select id="role">
<option value="">Select Role</option>
<option value="farmer">Farmer</option>
<option value="expert">Expert</option>
<option value="public">Public</option>
<option value="government">Government</option>
<option value="admin">Admin</option>
</select>

<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">Login with Password</button>

<hr>

<!-- OTP LOGIN -->

<h3>Login with OTP</h3>

<input type="email" id="otpEmail" placeholder="Enter Email for OTP">

<select id="otpRole">
<option value="">Select Role</option>
<option value="farmer">Farmer</option>
<option value="expert">Expert</option>
<option value="public">Public</option>
<option value="government">Government</option>
</select>

<button onclick="sendOtp()">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP">

<button onclick="verifyOtp()">Login with OTP</button>

<p id="message"></p>

</div>


<script>

const API = "https://kisanmitra-backend-98bb.onrender.com/api/users";


// ===============================
// PASSWORD LOGIN
// ===============================

async function loginUser(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();
const role = document.getElementById("role").value;

if(!email || !password || !role){

document.getElementById("message").innerText =
"Please enter email, password and role";

return;

}

try{

const res = await fetch(API + "/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password,
role
})
});

const data = await res.json();

if(!res.ok){

document.getElementById("message").innerText = data.message;
return;

}

// save logged user
localStorage.setItem("user", JSON.stringify(data.user));

// redirect
redirectUser(data.user.role, data.profileExists);

}
catch(error){

document.getElementById("message").innerText = "Server connection error";

}

}



// ===============================
// SEND OTP
// ===============================

async function sendOtp(){

const email = document.getElementById("otpEmail").value.trim();
const role = document.getElementById("otpRole").value;

if(!email || !role){

document.getElementById("message").innerText =
"Please enter email and role";

return;

}

try{

const res = await fetch(API + "/send-otp",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
role
})
});

const data = await res.json();

document.getElementById("message").innerText = data.message;

}
catch(error){

document.getElementById("message").innerText = "OTP send failed";

}

}



// ===============================
// VERIFY OTP
// ===============================

async function verifyOtp(){

const email = document.getElementById("otpEmail").value.trim();
const otp = document.getElementById("otp").value.trim();
const role = document.getElementById("otpRole").value;

if(!email || !otp || !role){

document.getElementById("message").innerText =
"Please enter email, role and OTP";

return;

}

try{

const res = await fetch(API + "/verify-otp",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
otp,
role
})
});

const data = await res.json();

if(!res.ok){

document.getElementById("message").innerText = data.message;
return;

}

// save user
localStorage.setItem("user", JSON.stringify(data.user));

// redirect
redirectUser(data.user.role, data.profileExists);

}
catch(error){

document.getElementById("message").innerText = "OTP verification failed";

}

}



// ===============================
// REDIRECT USER
// ===============================

function redirectUser(role, profileExists){

profileExists = profileExists === true;


// FARMER
if(role === "farmer"){

if(profileExists){
window.location.href = "farmer";
}
else{
window.location.href = "farmer-profile";
}

}


// EXPERT
else if(role === "expert"){

if(profileExists){
window.location.href = "expert";
}
else{
window.location.href = "expert-profile";
}

}


// PUBLIC
else if(role === "public"){

if(profileExists){
window.location.href = "public-dashboard";
}
else{
window.location.href = "public-profile";
}

}


// GOVERNMENT
else if(role === "government"){

if(profileExists){
window.location.href = "government-dashboard";
}
else{
window.location.href = "government-profile";
}

}


// ADMIN
else if(role === "admin"){

window.location.href = "admin-dashboard";

}

}

</script>

</body>
</html>

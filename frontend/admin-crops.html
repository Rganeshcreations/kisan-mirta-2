<!DOCTYPE html>
<html>

<head>
<title>Admin Crops - KisanMitra</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
background:#2c3e50;
position:fixed;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar button{
width:90%;
margin:10px;
padding:12px;
border:none;
background:#34495e;
color:white;
cursor:pointer;
border-radius:5px;
}

.sidebar button:hover{
background:#1abc9c;
}

/* Main */

.main{
margin-left:260px;
padding:30px;
}

.header{
font-size:28px;
margin-bottom:20px;
}

/* Table */

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#1abc9c;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<button onclick="location.href='admin-dashboard'">Dashboard</button>

<button onclick="location.href='admin-farmers'">Farmers</button>

<button onclick="location.href='admin-experts'">Experts</button>

<button onclick="location.href='admin-users'">Public Users</button>

<button onclick="location.href='admin-crops'">Crops</button>

<button onclick="location.href='admin-expenditures'">Expenditures</button>

<button onclick="logout()">Logout</button>

</div>


<div class="main">

<div class="header">
All Farmer Crops
</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>Farmer</th>
<th>Crop</th>
<th>Seeding Date</th>
<th>Land Size</th>
<th>Quantity Produced</th>
<th>Selling Price</th>
</tr>

</thead>

<tbody id="cropsTable">

</tbody>

</table>

</div>


<script>

async function loadCrops(){

const res = await fetch("https://kisanmitra-backend-98bb.onrender.com/api/admin/crops");

const crops = await res.json();

let table="";

crops.forEach(c=>{

table+=`
<tr>
<td>${c.id}</td>
<td>${c.farmer_name}</td>
<td>${c.crop_name}</td>
<td>${new Date(c.seeding_date).toLocaleDateString()}</td>
<td>${c.land_size} Acres</td>
<td>${c.quantity_produced} kg</td>
<td>₹ ${c.selling_price}</td>
</tr>
`;

});

document.getElementById("cropsTable").innerHTML=table;

}

function logout(){

localStorage.clear();
window.location.href="/login";

}

loadCrops();

</script>

</body>

</html>

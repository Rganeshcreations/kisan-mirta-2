<!DOCTYPE html>
<html>

<head>
<title>Farmer Profile View - KisanMitra</title>

<style>
body {
margin: 0;
font-family: Arial;
background: linear-gradient(rgba(0,100,0,0.7), rgba(0,0,0,0.8)),
url("images/farmer-bg.jpg");
background-size: cover;
color: white;
}

.container {
display: flex;
padding: 40px;
}

.left-panel {
width: 300px;
background: rgba(0,0,0,0.7);
padding: 20px;
border-radius: 15px;
text-align: center;
}

.left-panel img {
width: 150px;
height: 150px;
border-radius: 50%;
border: 4px solid white;
object-fit: cover;
}

.left-panel h2 {
margin-top: 15px;
}

.right-panel {
flex: 1;
margin-left: 40px;
background: rgba(255,255,255,0.15);
padding: 30px;
border-radius: 15px;
backdrop-filter: blur(10px);
}

.info-row {
margin-bottom: 15px;
font-size: 18px;
}

</style>

</head>

<body>

<div class="container">

<!-- LEFT PANEL -->
<div class="left-panel">

<img id="profileImage" src="images/ganesh.jpg">

<h2 id="farmerName"></h2>
<p id="farmerLocation"></p>

</div>

<!-- RIGHT PANEL -->
<div class="right-panel">

<h1>🌾 Farmer Profile</h1>

<div class="info-row">🌱 Crops: <span id="crops"></span></div>
<div class="info-row">🌍 Land Area: <span id="land_area"></span></div>
<div class="info-row">🌾 Soil Type: <span id="soil_type"></span></div>
<div class="info-row">📍 Location: <span id="location"></span></div>
<div class="info-row">💧 Irrigation: <span id="irrigation_type"></span></div>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded", async function () {

// 🔥 FIX: SUPPORT BOTH GOVERNMENT + FARMER LOGIN

let user = null;

// If government selected farmer
if(localStorage.getItem("viewFarmerId")){
user = {
id: localStorage.getItem("viewFarmerId"),
name: localStorage.getItem("viewFarmerName")
};
} 
// Else normal farmer login
else {
user = JSON.parse(localStorage.getItem("user"));
}

if (!user) {
alert("Login required");
window.location.href = "/login";
return;
}

// Show name
document.getElementById("farmerName").innerText = user.name || "Farmer";

try {

const res = await fetch(
"https://kisanmitra-backend-98bb.onrender.com/api/users/farmer-profile/" + user.id
);

const profile = await res.json();

if (!profile.exists) {
alert("Profile not created");
return;
}

// Fill data
document.getElementById("crops").innerText = profile.crops || "-";
document.getElementById("land_area").innerText =
(profile.land_area || "-") + " acres";
document.getElementById("soil_type").innerText =
profile.soil_type || "-";
document.getElementById("location").innerText =
profile.location || "-";
document.getElementById("irrigation_type").innerText =
profile.irrigation_type || "-";
document.getElementById("farmerLocation").innerText =
profile.location || "-";

} catch (error) {

console.log("Profile error:", error);
alert("Failed to load profile");

}

});

</script>

</body>
</html>

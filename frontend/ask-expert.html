<!DOCTYPE html>

<html>
<head>

<title>Ask Expert</title>

<style>

body{
margin:0;
font-family:Arial;
background:
linear-gradient(rgba(34,139,34,0.6),rgba(0,0,0,0.7)),
url("images/farmer-bg.jpg");
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:15px;
backdrop-filter:blur(10px);
width:420px;
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:none;
}

button{
margin-top:15px;
padding:12px 18px;
background:#2e7d32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

</style>

</head>

<body>

<div class="box">

<h2>Ask Agriculture Expert</h2>

<textarea id="question"
placeholder="Describe your farming problem..."></textarea>

<button onclick="submitQuestion()">Submit Question</button>

<p id="msg"></p>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));
const expertId = localStorage.getItem("selectedExpert");

if(!user){
window.location.href="/login";
}

async function submitQuestion(){

const question=document.getElementById("question").value;

if(!question){
alert("Enter question");
return;
}

const res = await fetch(
"http://localhost:5000/api/users/ask-question",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
farmer_id:user.id,
expert_id:expertId,
question
})
}
);

const data = await res.json();

document.getElementById("msg").innerText=data.message;

setTimeout(()=>{
window.location.href="farmer";
},1500);

}

</script>

</body>
</html>

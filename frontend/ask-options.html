<!DOCTYPE html>

<html>
<head>

<title>Ask Expert - KisanMitra</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:
linear-gradient(rgba(34,139,34,0.6),rgba(0,0,0,0.7)),
url("images/farmer-bg.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* MAIN BOX */

.container{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
width:400px;
text-align:center;
}

.container h2{
margin-bottom:30px;
}

/* OPTION BUTTONS */

.option{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:15px 0;
padding:15px;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.ai{
background:#1976d2;
}

.human{
background:#2e7d32;
}

.option:hover{
transform:scale(1.05);
opacity:0.9;
}

/* BACK BUTTON */

.back{
margin-top:20px;
background:white;
color:#2e7d32;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Ask Farming Help</h2>

<div class="option ai"
onclick="openAI()">

🤖 Ask AI Assistant

</div>

<div class="option human"
onclick="openHuman()">

👨‍🌾 Ask Human Expert

</div>

<button class="back"
onclick="window.location.href='farmer'">

⬅ Back to Dashboard

</button>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="/login";
}

function openAI(){
  window.open("https://agent.kissan.ai/", "_blank");
}

function openHuman(){
window.location.href="human-experts";
}

</script>

</body>
</html>
